  team_members:
    - name: "Alice"
      role: "架构师 + 全栈开发"
      allocation: "100%"
      responsibilities:
        - "Domain Layer 开发"
        - "Application Layer 开发"
        - "Infrastructure Layer 开发"
        - "Frontend Layer 开发"
        - "测试开发"

    - name: "kp"
      role: "项目负责人"
      allocation: "20%"
      responsibilities:
        - "需求评审"
        - "代码审查"
        - "架构决策"

  tools:
    - name: "TypeScript"
      purpose: "主要开发语言"
      version: "5.x"

    - name: "Node.js"
      purpose: "后端运行时"
      version: "20.x"

    - name: "React"
      purpose: "前端框架"
      version: "18.x"

    - name: "Vitest"
      purpose: "测试框架"
      version: "latest"

    - name: "PostgreSQL"
      purpose: "数据库"
      version: "16.x"

# ============================================================
# 风险和缓解措施（Risks）
# ============================================================
risks:
  - risk_id: "risk-1-domain-complexity"
    description: "Domain Layer 实体关系复杂，可能影响开发进度"
    probability: "medium"
    impact: "high"
    mitigation: "采用分优先级开发策略，先完成核心实体"
    status: "monitoring"

  - risk_id: "risk-2-runtime-complexity"
    description: "运行时组件（AgentDaemon、ChannelRuntime）实现复杂"
    probability: "high"
    impact: "high"
    mitigation: "提前进行技术调研，参考成熟方案"
    status: "monitoring"

  - risk_id: "risk-3-test-coverage"
    description: "测试覆盖率目标难以达成"
    probability: "low"
    impact: "medium"
    mitigation: "采用 TDD 方法，从开发初期就编写测试"
    status: "monitoring"

