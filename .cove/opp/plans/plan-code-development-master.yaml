plan_id: "plan-code-development-master"
title: "Cove Code 开发详细计划"

description: |
  本计划定义了 Cove 项目 code 目录的详细开发路线图。
  基于 V4 架构设计，按照 Domain → Application → Infrastructure → Frontend 的顺序实施。
  采用 TDD 方法，确保代码质量和测试覆盖率。

related_okr_id: "okr-code-development-2026q2"
parent_plan_id: "plan-cove-mvp-master"

timeline:
  start_date: "2026-05-08"
  end_date: "2026-06-30"
  duration_weeks: 8

status: "active"

# ============================================================
# 开发阶段（Phases）
# ============================================================
phases:
  # ============================================================
  # 阶段 1: Domain Layer 开发
  # ============================================================
  - phase_id: "phase-1-domain"
    name: "阶段 1: Domain Layer 开发"
    description: "实现所有领域实体和领域服务"
    start_date: "2026-05-08"
    end_date: "2026-05-20"
    duration_days: 12
    status: "in_progress"

    objectives:
      - "完成 16 个核心实体实现"
      - "完成 5 个领域服务实现"
      - "单元测试覆盖率 ≥ 80%"

    deliverables:
      - name: "Domain 实体"
        path: "code/backend/01-domain/models/"
        status: "in_progress"
        completion: 15

      - name: "Domain 服务"
        path: "code/backend/01-domain/services/"
        status: "pending"
        completion: 0

    workflows:
      - workflow_id: "wf-domain-entities"
        name: "Domain 实体开发工作流"

      - workflow_id: "wf-domain-services"
        name: "Domain 服务开发工作流"

    milestones:
      - date: "2026-05-12"
        description: "P0 核心实体完成（Agent, Project, User, Channel, Message）"

      - date: "2026-05-16"
        description: "P1 重要实体完成（Task, OKR, Workflow, Execution）"

      - date: "2026-05-20"
        description: "所有实体和领域服务完成"

  # ============================================================
  # 阶段 2: Application Layer 开发
  # ============================================================
  - phase_id: "phase-2-application"
    name: "阶段 2: Application Layer 开发"
    description: "实现应用服务和运行时组件"
    start_date: "2026-05-15"
    end_date: "2026-06-05"
    duration_days: 21
    status: "pending"
    depends_on: ["phase-1-domain"]

    objectives:
      - "完成 10 个应用服务实现"
      - "完成 4 个运行时组件实现"
      - "集成测试覆盖率 ≥ 70%"

    deliverables:
      - name: "应用服务"
        path: "code/backend/02-application/services/"
        status: "pending"
        completion: 0

      - name: "运行时组件"
        path: "code/backend/02-application/runtime/"
        status: "pending"
        completion: 0

    workflows:
      - workflow_id: "wf-app-services"
        name: "应用服务开发工作流"

      - workflow_id: "wf-runtime-components"
        name: "运行时组件开发工作流"

    milestones:
      - date: "2026-05-25"
        description: "核心应用服务完成（Project, Agent, Channel, Message, Task）"

      - date: "2026-06-01"
        description: "AgentDaemon 和 ChannelRuntime 完成"

      - date: "2026-06-05"
        description: "所有应用服务和运行时组件完成"

  # ============================================================
  # 阶段 3: Infrastructure Layer 开发
  # ============================================================
  - phase_id: "phase-3-infrastructure"
    name: "阶段 3: Infrastructure Layer 开发"
    description: "实现技术基础设施（API、数据库、WebSocket、CLI）"
    start_date: "2026-05-20"
    end_date: "2026-06-10"
    duration_days: 21
    status: "pending"
    depends_on: ["phase-1-domain"]

    objectives:
      - "完成 REST API 端点实现"
      - "完成数据库 Schema 和 Repository 实现"
      - "完成 WebSocket 实时通信"
      - "完成 CLI 核心命令"
      - "集成测试覆盖率 ≥ 70%"

    deliverables:
      - name: "REST API"
        path: "code/backend/03-infrastructure/api/"
        status: "pending"
        completion: 0

      - name: "数据库"
        path: "code/backend/03-infrastructure/database/"
        status: "pending"
        completion: 0

      - name: "WebSocket"
        path: "code/backend/03-infrastructure/websocket/"
        status: "pending"
        completion: 0

      - name: "CLI"
        path: "code/backend/03-infrastructure/cli/"
        status: "pending"
        completion: 0

    workflows:
      - workflow_id: "wf-infra-api"
        name: "REST API 开发工作流"

      - workflow_id: "wf-infra-database"
        name: "数据库开发工作流"

      - workflow_id: "wf-infra-websocket"
        name: "WebSocket 开发工作流"

      - workflow_id: "wf-infra-cli"
        name: "CLI 开发工作流"

    milestones:
      - date: "2026-05-28"
        description: "数据库 Schema 和 Repository 完成"

      - date: "2026-06-05"
        description: "REST API 核心端点完成"

      - date: "2026-06-10"
        description: "WebSocket 和 CLI 完成"

  # ============================================================
  # 阶段 4: Frontend Layer 开发
  # ============================================================
  - phase_id: "phase-4-frontend"
    name: "阶段 4: Frontend Layer 开发"
    description: "实现前端核心功能界面"
    start_date: "2026-05-25"
    end_date: "2026-06-20"
    duration_days: 26
    status: "pending"
    depends_on: ["phase-1-domain"]

    objectives:
      - "完成 Chat 功能域"
      - "完成 Task 功能域"
      - "完成 OKR 功能域"
      - "完成 Agent 功能域"
      - "组件测试覆盖率 ≥ 70%"

    deliverables:
      - name: "Chat 功能域"
        path: "code/frontend/04-presentation/features/chat/"
        status: "pending"
        completion: 0

      - name: "Task 功能域"
        path: "code/frontend/04-presentation/features/task/"
        status: "pending"
        completion: 0

      - name: "OKR 功能域"
        path: "code/frontend/04-presentation/features/okr/"
        status: "pending"
        completion: 0

      - name: "共享组件"
        path: "code/frontend/04-presentation/shared/"
        status: "pending"
        completion: 0

    workflows:
      - workflow_id: "wf-frontend-chat"
        name: "Chat 界面开发工作流"

      - workflow_id: "wf-frontend-task"
        name: "Task Board 开发工作流"

      - workflow_id: "wf-frontend-okr"
        name: "OKR Dashboard 开发工作流"

    milestones:
      - date: "2026-06-05"
        description: "Chat 功能域完成"

      - date: "2026-06-12"
        description: "Task 功能域完成"

      - date: "2026-06-20"
        description: "OKR 和 Agent 功能域完成"

  # ============================================================
  # 阶段 5: 测试和质量保证
  # ============================================================
  - phase_id: "phase-5-testing"
    name: "阶段 5: 测试和质量保证"
    description: "完善测试体系，确保代码质量"
    start_date: "2026-06-10"
    end_date: "2026-06-30"
    duration_days: 20
    status: "pending"
    depends_on: ["phase-2-application", "phase-3-infrastructure", "phase-4-frontend"]

    objectives:
      - "单元测试覆盖率 ≥ 80%"
      - "集成测试覆盖关键 API"
      - "E2E 测试覆盖核心流程"
      - "所有测试通过 CI/CD"

    deliverables:
      - name: "单元测试"
        description: "所有模块的单元测试"
        status: "pending"
        completion: 0

      - name: "集成测试"
        description: "API 和数据库集成测试"
        status: "pending"
        completion: 0

      - name: "E2E 测试"
        description: "关键用户流程的端到端测试"
        status: "pending"
        completion: 0

    workflows:
      - workflow_id: "wf-testing-unit"
        name: "单元测试开发工作流"

      - workflow_id: "wf-testing-integration"
        name: "集成测试开发工作流"

      - workflow_id: "wf-testing-e2e"
        name: "E2E 测试开发工作流"

    milestones:
      - date: "2026-06-20"
        description: "单元测试和集成测试完成"

      - date: "2026-06-25"
        description: "E2E 测试完成"

      - date: "2026-06-30"
        description: "所有测试通过，代码质量验收"

