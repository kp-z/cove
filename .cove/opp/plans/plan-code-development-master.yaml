# ============================================================
# 依赖关系（Dependencies）
# ============================================================
dependencies:
  - from: "phase-2-application"
    to: "phase-1-domain"
    type: "blocking"
    description: "Application Layer 依赖 Domain Layer 完成"

  - from: "phase-3-infrastructure"
    to: "phase-1-domain"
    type: "blocking"
    description: "Infrastructure Layer 依赖 Domain Layer 完成"

  - from: "phase-4-frontend"
    to: "phase-1-domain"
    type: "soft"
    description: "Frontend 可以使用 Mock 数据并行开发"

  - from: "phase-5-testing"
    to: "phase-2-application"
    type: "blocking"
    description: "集成测试依赖 Application Layer 完成"

  - from: "phase-5-testing"
    to: "phase-3-infrastructure"
    type: "blocking"
    description: "集成测试依赖 Infrastructure Layer 完成"

  - from: "phase-5-testing"
    to: "phase-4-frontend"
    type: "blocking"
    description: "E2E 测试依赖 Frontend 完成"

