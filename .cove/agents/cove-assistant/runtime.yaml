model:
  provider: anthropic
  model_name: claude-sonnet-4.0
  temperature: 0.7
  max_tokens: 8192
  top_p: 0.9
  thinking_budget: 5000
api:
  base_url: https://api.anthropic.com/v1
  api_key: ${ANTHROPIC_API_KEY}
  timeout_seconds: 120
  headers:
    anthropic-version: '2023-06-01'
  inherit_default: true
context:
  max_context_window: 200000
  context_retention: auto
  compression_threshold: 0.8
  compression_strategy: structured
retry:
  max_retries: 3
  backoff_strategy: exponential
  initial_delay_ms: 1000
  max_delay_ms: 30000
  retry_on_errors:
    - rate_limit_error
    - timeout_error
    - server_error
rate_limit:
  requests_per_minute: 60
  tokens_per_minute: 200000
  concurrent_requests: 5
cache:
  enabled: true
  cache_type: prompt_caching
  ttl_seconds: 3600
response:
  stream: true
  max_response_time_seconds: 60
  format: markdown
adapter_id: 5d6822ff-43a4-443b-a5eb-65d5015a445c
