# runtime/agent_daemon/agent-001/daemon.yaml
# AgentDaemon 运行时状态配置示例
# 注意：此文件记录运行时动态状态，与 Entity 层的 agents/{agent_id}/runtime.yaml（静态配置）不同

# 守护进程信息
daemon_id: "daemon-001"                  # 守护进程 ID
agent_id: "agent-001"                    # 关联的 Agent（对应 agents/agent-001/）
pid: 12345                               # 操作系统进程 ID
status: "running"                        # 状态: starting | running | sleeping | stopping | stopped
started_at: "2026-05-01T10:00:00Z"
last_heartbeat: "2026-05-04T10:29:30Z"

# 服务对象（此 Daemon 管理的 Entity 类型）
service_entities:
  - "AgentEntity"
  - "ConversationEntity"
  - "MessageEntity"
  - "ExecutionEntity"

# 核心组件（Threads）运行时状态
components:
  # 心跳线程
  heartbeat_thread:
    enabled: true
    interval_seconds: 30                 # 心跳间隔
    timeout_seconds: 90                  # 超时时间
    last_heartbeat: "2026-05-04T10:29:30Z"
    status: "healthy"

  # 消息接收线程（Inbox）
  message_inbox_thread:
    enabled: true
    queue_size: 100                      # 队列大小
    poll_interval_ms: 100                # 轮询间隔
    pending_messages: 3                  # 待处理消息数
    status: "active"

  # 消息发送线程（Outbox）
  message_outbox_thread:
    enabled: true
    queue_size: 100
    batch_size: 10                       # 批量发送大小
    retry_attempts: 3
    pending_messages: 0
    status: "active"

  # 对话管理线程
  conversation_manager_thread:
    enabled: true
    max_conversations: 10                # 最大并发对话数
    active_conversations: 2              # 当前活跃对话数
    context_window_size: 200000          # 上下文窗口大小
    compression_enabled: true            # 是否启用压缩
    status: "active"

  # API 调用线程
  api_call_thread:
    enabled: true
    rate_limit_rpm: 60                   # 每分钟请求数限制
    rate_limit_tpm: 200000               # 每分钟 token 数限制
    current_rpm: 15                      # 当前每分钟请求数
    current_tpm: 50000                   # 当前每分钟 token 数
    queue_size: 50
    status: "active"

# Trigger 管理器运行时状态
# 注意：trigger_type 字段与 Entity 层 config/triggers.yaml 保持一致
trigger_manager:
  enabled: true
  active_triggers: 2
  triggers:
    - trigger_id: "trigger-001"
      name: "daily-architecture-review"          # kebab-case，与 Entity 层一致
      display_name: "每日架构审查"                # 人类可读名称
      trigger_type: "schedule"                   # 与 Entity 层 trigger_type 字段一致（非 type）
      schedule:
        cron: "0 9 * * *"                        # 与 Entity 层 schedule.cron 结构一致
        timezone: "Asia/Shanghai"
      next_run: "2026-05-05T09:00:00+08:00"
      status: "active"
      last_triggered: "2026-05-04T09:00:00+08:00"
      execution_count: 15

    - trigger_id: "trigger-002"
      name: "pr-auto-review"                     # kebab-case
      display_name: "PR 创建时自动审查"
      trigger_type: "event"                      # 与 Entity 层一致
      event:
        event_source: "github"                   # 与 Entity 层 event.event_source 一致
        event_type: "pull_request.opened"
      status: "active"
      last_triggered: "2026-05-03T15:30:00+08:00"
      execution_count: 8

# Plugin 管理器运行时状态
# 注意：features 字段与 Entity 层 config/plugins.yaml 保持一致
plugin_manager:
  enabled: true
  active_plugins: 1
  plugins:
    - plugin_id: "plugin-001"
      name: "github-integration"                 # kebab-case，与 Entity 层一致
      display_name: "GitHub Integration"         # 人类可读名称
      version: "1.2.0"
      status: "active"
      loaded_at: "2026-05-01T10:00:00Z"
      features:                                  # 与 Entity 层 features 结构一致（非 capabilities）
        - feature_id: "pr-review"
          name: "PR 审查"
          enabled: true
          permissions:
            - "read:pull_request"
            - "write:pull_request_comment"
        - feature_id: "issue-management"
          name: "Issue 管理"
          enabled: true
          permissions:
            - "read:issue"
            - "write:issue"
      config:
        token: "${GITHUB_TOKEN}"
        repo: "owner/repo"
      health_check:
        last_check: "2026-05-04T10:29:00Z"
        status: "healthy"

    - plugin_id: "plugin-002"
      name: "feishu-notification"                # kebab-case，与 Entity 层一致
      display_name: "Feishu Notification"
      version: "1.0.0"
      status: "inactive"
      loaded_at: null
      features:
        - feature_id: "message-push"
          name: "消息推送"
          enabled: true
          permissions:
            - "send:message"
      config:
        webhook_url: "${FEISHU_WEBHOOK}"
      health_check:
        last_check: null
        status: "unknown"

# 资源使用
resource_usage:
  cpu_percent: 15.5                      # CPU 使用率
  memory_mb: 512                         # 内存使用（MB）
  disk_io_mb: 25                         # 磁盘 IO（MB）
  network_io_mb: 10                      # 网络 IO（MB）

# 统计信息
statistics:
  total_messages_received: 1523
  total_messages_sent: 1489
  total_executions: 156
  total_errors: 12
  uptime_seconds: 86400                  # 运行时长（秒）

# 映射到 Backend 服务
backend_services:
  - "AgentRuntimeService"
  - "AgentChatService"
  - "ExecutionService"
