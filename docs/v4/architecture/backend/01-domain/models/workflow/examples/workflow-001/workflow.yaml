# Workflow Entity Example: Code Review Workflow
id: wf_code_review_001
name: code-review-workflow
display_name: "Code Review Workflow"
status: active
created_at: 2026-03-01T00:00:00Z
updated_at: 2026-05-09T00:00:00Z

# Workflow context
context:
  project_id: proj_cove_001
  kr_id: kr_001
  owner_id: usr_kp_001

# Workflow definition
definition:
  description: "Automated code review workflow triggered by pull requests"
  version: "2.0.0"

  # Workflow triggers
  triggers:
    - type: pull_request_opened
      conditions:
        - branch_pattern: "feature/*"
        - files_changed: "*.ts,*.tsx,*.js,*.jsx"
    - type: pull_request_updated
      conditions:
        - new_commits: true

  # Workflow steps (nested array structure)
  # Outer array: sequential stages
  # Inner array: parallel steps
  steps:
    # Stage 1: Run linter (sequential)
    - - id: step_001
        task_id: task_linter_001
        timeout_minutes: 5
        on_failure: continue

    # Stage 2: Run tests (sequential)
    - - id: step_002
        task_id: task_tests_001
        condition: "step_001.status == 'done'"
        timeout_minutes: 10
        on_failure: fail

    # Stage 3: Parallel analysis (parallel)
    - - id: step_003
        task_id: task_code_quality_001
        condition: "step_002.status == 'done'"
        timeout_minutes: 5
        on_failure: continue
      - id: step_004
        task_id: task_security_scan_001
        condition: "step_002.status == 'done'"
        timeout_minutes: 5
        on_failure: continue
      - id: step_005
        task_id: task_coverage_check_001
        condition: "step_002.status == 'done'"
        timeout_minutes: 3
        on_failure: continue

    # Stage 4: Post review comment (sequential)
    - - id: step_006
        task_id: task_post_comment_001
        condition: "step_003.status == 'done' || step_004.status == 'done' || step_005.status == 'done'"
        timeout_minutes: 1
        on_failure: continue

    # Stage 5: Request human review (sequential)
    - - id: step_007
        task_id: task_request_review_001
        condition: "step_006.status == 'done'"
        timeout_minutes: 1440  # 24 hours
        on_failure: notify

# Workflow execution history
execution_history:
  total_runs: 47
  successful_runs: 42
  failed_runs: 5
  average_duration_minutes: 7
  last_run_id: exec_wf_cr_047
  last_run_at: 2026-05-05T15:30:00Z
  last_run_status: success

# Workflow configuration
config:
  max_concurrent_executions: 3
  retry_policy:
    max_retries: 2
    retry_delay_seconds: 60
  notification_channels:
    - ch_dev_001
  notification_events:
    - workflow_failed
    - workflow_completed
    - approval_required

# Workflow metrics
metrics:
  success_rate: 0.894
  average_duration_minutes: 7
  p95_duration_minutes: 13
  total_executions: 47
