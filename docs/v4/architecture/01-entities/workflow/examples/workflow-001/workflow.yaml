# Workflow Entity Example: Code Review Workflow
id: wf_code_review_001
name: code-review-workflow
display_name: "Code Review Workflow"
type: automated
status: active
created_at: 2026-03-01T00:00:00Z
updated_at: 2026-05-06T02:00:00Z

# Workflow context
context:
  project_id: proj_claude_manager_001
  owner_id: usr_kp_001
  trigger_type: pull_request
  
# Workflow definition
definition:
  description: "Automated code review workflow triggered by pull requests"
  version: "1.2.0"
  
  # Workflow triggers
  triggers:
    - type: pull_request_opened
      conditions:
        - branch_pattern: "feature/*"
        - files_changed: "*.ts,*.tsx,*.js,*.jsx"
    - type: pull_request_updated
      conditions:
        - new_commits: true
        
  # Workflow steps
  steps:
    - id: step_001
      name: "Run linter"
      type: execution
      agent_id: agt_code_reviewer_001
      action: run_linter
      timeout_seconds: 300
      on_failure: continue
      
    - id: step_002
      name: "Run tests"
      type: execution
      agent_id: agt_code_reviewer_001
      action: run_tests
      timeout_seconds: 600
      on_failure: fail_workflow
      depends_on: [step_001]
      
    - id: step_003
      name: "Code quality analysis"
      type: execution
      agent_id: agt_code_reviewer_001
      action: analyze_code_quality
      timeout_seconds: 300
      on_failure: continue
      depends_on: [step_002]
      
    - id: step_004
      name: "Post review comment"
      type: notification
      agent_id: agt_code_reviewer_001
      action: post_review_summary
      timeout_seconds: 60
      on_failure: continue
      depends_on: [step_001, step_002, step_003]
      
    - id: step_005
      name: "Request human review"
      type: approval
      assignee_id: usr_kp_001
      action: request_approval
      timeout_seconds: 86400  # 24 hours
      on_timeout: notify_owner
      depends_on: [step_004]

# Workflow execution history
execution_history:
  total_runs: 47
  successful_runs: 42
  failed_runs: 5
  average_duration_seconds: 420
  last_run_id: exec_wf_cr_047
  last_run_at: 2026-05-05T15:30:00Z
  last_run_status: success

# Workflow configuration
config:
  max_concurrent_executions: 3
  retry_policy:
    max_retries: 2
    retry_delay_seconds: 60
  notification_channels:
    - ch_dev_001
  notification_events:
    - workflow_failed
    - workflow_completed
    - approval_required

# Workflow metrics
metrics:
  success_rate: 0.894
  average_duration_seconds: 420
  p95_duration_seconds: 780
  total_executions: 47
